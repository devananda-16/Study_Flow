{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 rounded-3xl shadow-xl mt-12 border border-gray-100 text-center">
    <h2 class="text-4xl font-black text-gray-800 mb-2">Join Us</h2>
    <p class="text-gray-400 mb-8 font-medium">Start organizing your syllabus today</p>
    <form class="space-y-4">
        <input type="text" placeholder="Full Name" class="w-full border p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
        <input type="email" placeholder="Email" class="w-full border p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" placeholder="Password" class="w-full border p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
        <button type="button" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-700 shadow-lg shadow-green-100">Create Account</button>
    </form>
</div>
{% endblock %}
