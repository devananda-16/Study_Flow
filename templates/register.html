{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4 py-8">
    
    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <div class="mx-auto bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mb-5 shadow-inner">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-black text-gray-800 mb-1 tracking-tight">Create Account</h2>
        <p class="text-gray-500 mb-8 font-medium text-sm">Start organizing your syllabus today.</p>

        <form method="POST" action="" class="space-y-5 text-left">
            
            <div>
                <label for="fullname" class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe" required
                    class="w-full border border-gray-200 p-3.5 rounded-xl bg-gray-50 text-gray-800 outline-none transition-all duration-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400">
            </div>

            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required
                    class="w-full border border-gray-200 p-3.5 rounded-xl bg-gray-50 text-gray-800 outline-none transition-all duration-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    class="w-full border border-gray-200 p-3.5 rounded-xl bg-gray-50 text-gray-800 outline-none transition-all duration-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required
                    class="w-full border border-gray-200 p-3.5 rounded-xl bg-gray-50 text-gray-800 outline-none transition-all duration-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400">
            </div>

            <div class="flex items-start pt-1">
                <label class="flex items-center text-sm text-gray-600 cursor-pointer hover:text-gray-800 transition-colors">
                    <input type="checkbox" name="terms" required class="mr-2 mt-0.5 w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="leading-tight">I agree to the <a href="#" class="text-blue-600 hover:underline">Terms</a> & <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a></span>
                </label>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3.5 rounded-xl font-bold text-lg hover:from-blue-700 hover:to-indigo-700 transition-all duration-200 shadow-lg shadow-blue-200 transform hover:-translate-y-0.5">
                Sign Up
            </button>
        </form>

        <p class="mt-8 text-sm text-gray-600 font-medium">
            Already have an account? 
            <a href="#" class="text-blue-600 font-bold hover:underline hover:text-indigo-700 transition-colors">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
