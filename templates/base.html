<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow | Exam Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-2xl font-black text-blue-600 tracking-tighter italic">StudyFlow</a>
            <div class="space-x-8 flex items-center">
                <a href="{{ url_for('index') }}" class="text-gray-600 hover:text-blue-600 font-semibold">Dashboard</a>
                <a href="{{ url_for('login') }}" class="text-gray-600 hover:text-blue-600 font-semibold">Login</a>
                <a href="{{ url_for('register') }}" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">Get Started</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
