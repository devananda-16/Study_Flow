{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    
    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <div class="mx-auto bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mb-5 shadow-inner">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-black text-gray-800 mb-1 tracking-tight">Study-Flow</h2>
        <p class="text-gray-500 mb-8 font-medium text-sm">Welcome back! Log in to track your progress.</p>

        <form method="POST" action="" class="space-y-5 text-left">
            
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required
                    class="w-full border border-gray-200 p-3.5 rounded-xl bg-gray-50 text-gray-800 outline-none transition-all duration-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    class="w-full border border-gray-200 p-3.5 rounded-xl bg-gray-50 text-gray-800 outline-none transition-all duration-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400">
            </div>

            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center text-sm text-gray-600 cursor-pointer hover:text-gray-800 transition-colors">
                    <input type="checkbox" name="remember" class="mr-2 w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    Remember me
                </label>
                <a href="#" class="text-sm font-semibold text-blue-600 hover:text-indigo-700 transition-colors">Forgot Password?</a>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3.5 rounded-xl font-bold text-lg hover:from-blue-700 hover:to-indigo-700 transition-all duration-200 shadow-lg shadow-blue-200 transform hover:-translate-y-0.5">
                Sign In
            </button>
        </form>

        <p class="mt-8 text-sm text-gray-600 font-medium">
            New to Study-Flow? 
            <a href="#" class="text-blue-600 font-bold hover:underline hover:text-indigo-700 transition-colors">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
